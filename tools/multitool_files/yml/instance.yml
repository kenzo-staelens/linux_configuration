instance_reset_mode: &instance_reset_mode
  !arg
  name:
    - --mode
  choices:
    - config
    - data
    - all
  default: all
  help: update instance config, database or both. Default 'all'

instance_reset_local: &instance_reset_local
  !arg
  name:
    - --local
  help: whether to source database locally
  action: store_true

instance_reset_dbfile: &instance_reset_dbfile
  !arg
  name:
    - --dbfile
  help: local database file to use, default 'backup.zip'
  default: backup.zip


root_instance:
  name: instance
  parent: root
  help: command utilities for instance data linked addons

root_instance_new:
  name: new
  parent: root_instance

root_instance_reset:
  name: reset
  parent: root_instance
  script: instance_reset
  args:
    - *instance_reset_mode
    - *instance_reset_local
    - *instance_reset_dbfile
