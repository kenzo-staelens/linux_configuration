run_odoo_port: &run_odoo_port
  !arg
  name:
    - -p
    - --port
  help:
    odoo port to run, autoincrements from 8069


run:
  name: run
  parent: root
  help: command utility to run containers
  script: run
  args:
    - *run_odoo_port

run_dev:
  name: dev
  default: true
  parent: run
  help: run dev mode
  script: run_script

run_debug:
  name: debug
  parent: run
  help: run debug mode
  script: run_script

run_odoo:
  name: odoo
  parent: run
  help: run odoo terminal mode
  script: run_script

run_shell:
  name: shell
  parent: run
  help: run shell mode
  script: run_script

run_sql:
  name: sql
  parent: run
  help: run psql mode
  script: run_script

